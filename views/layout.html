<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=STIX+Two+Text:ital,wght@0,400..700;1,400..700&family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <title>{{title}}</title>
  <style>
    body { font-family: system-ui, sans-serif;  margin: 0; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: .5rem; text-align: left; }
    form .row { margin-bottom: .6rem; }
    input { padding: .35rem; width: 100%; max-width: 420px; }
    button { padding: .5rem .9rem; cursor: pointer; }
    a { text-decoration: none; }
    .muted { color: #666; font-size: .95rem; }
    .actions a, .actions button { margin-right: .5rem; }
    .topbar { display: flex; align-items:center; margin-bottom: 1rem; position: absolute; bottom: 0;justify-content: center; width: 100%; margin-left: auto; margin-right: auto;}
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 1rem; margin: 1rem 0; }
    .topbar a { font-size: 32px; color: black; font-weight: 700; text-decoration: none; text-transform: none;}
    a, p, button {font-family: Poppins;}
    input { outline: none;}
  </style>
</head>
<body>
  <div class="topbar">
    <div><a href="/">VOCAB.io</a></div>
  </div>

  {{content}}
  
  <script src="/public/app.js"></script>
</body>
</html>
